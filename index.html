<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KENZY | Download Center</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0b0b0c;
        --card: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.08);
        --text: #fff;
        --sub: #888;
        --accent: #ff2a2a;
      }

      body.light {
        --bg: #f5f7fb;
        --card: rgba(255, 255, 255, 0.7);
        --border: rgba(0, 0, 0, 0.08);
        --text: #111;
        --sub: #666;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      /* glow */
      body::before {
        content: "";
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(255, 0, 0, 0.15),
          transparent 70%
        );
        top: -200px;
        left: -200px;
        z-index: -1;
      }

      /* toggle */
      .theme-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 10px 15px;
        border-radius: 10px;
        background: var(--card);
        border: 1px solid var(--border);
        cursor: pointer;
      }

      /* header */
      header {
        text-align: center;
        padding: 100px 20px 40px;
      }

      h1 {
        font-family: "Syncopate", sans-serif;
        font-size: clamp(2.5rem, 8vw, 4.5rem);
      }

      /* container */
      .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
      }

      /* premium card */
      .file-card {
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(20px);
        border-radius: 25px;
        padding: 60px;
        text-align: center;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        transition: 0.3s;
      }

      .file-card:hover {
        transform: translateY(-8px);
      }

      /* title */
      .file-card h2 {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .file-card p {
        color: var(--sub);
        margin-bottom: 30px;
      }

      /* button */
      .download-btn {
        display: inline-block;
        padding: 18px 40px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(90deg, #ff0000, #ff4d4d);
        color: #fff;
        transition: 0.3s;
      }

      .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
      }
    </style>
  </head>

  <body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

    <header>
      <h1>KENZY</h1>
      <p style="letter-spacing: 4px; color: var(--sub); font-weight: 700">
        DOWNLOAD PORTAL
      </p>
    </header>

    <div class="container">
      <div class="file-card">
        <h2>Curriculum Vitae</h2>
        <p>Professional CV document ready for download.</p>

        <a href="assets/cariculum vitae.pdf" download class="download-btn">
          DOWNLOAD FILE
        </a>
      </div>
    </div>

    <script>
      function toggleTheme() {
        document.body.classList.toggle("light");
        localStorage.setItem(
          "theme",
          document.body.classList.contains("light"),
        );
      }

      if (localStorage.getItem("theme") === "true") {
        document.body.classList.add("light");
      }
    </script>
  </body>
</html>
